<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TabDog</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Login Screen (shown when not logged in) -->
    <div class="login-screen" id="loginScreen">
      <div class="login-content">
        <img src="../icons/icon128.png" alt="TabDog" class="login-logo">
        <h1 class="login-title">TabDog</h1>
        <p class="login-subtitle">Sync your tabs across all devices</p>
        <button class="login-btn" id="loginBtn">
          <svg viewBox="0 0 24 24" width="18" height="18">
            <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
            <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
            <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
            <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
          </svg>
          Sign in with Google
        </button>
      </div>
    </div>

    <!-- App Content (shown when logged in) -->
    <div class="app-content" id="appContent" style="display: none;">
      <!-- Header -->
      <header class="header">
        <div class="header-left">
          <span class="status-indicator" id="statusIndicator"></span>
          <span class="status-text" id="statusText">Loading...</span>
        </div>
        <div class="header-right">
          <div class="user-menu" id="userMenu">
            <img class="user-avatar" id="userAvatar" src="" alt="User">
            <button class="user-menu-btn" id="userMenuBtn" title="Account">
              <svg viewBox="0 0 16 16" fill="currentColor">
                <path d="M9.5 13a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0zm0-5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0zm0-5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0z"/>
              </svg>
            </button>
          </div>
        </div>
      </header>
    
    <!-- User Dropdown Menu -->
    <div class="user-dropdown" id="userDropdown" style="display: none;">
      <div class="user-dropdown-header">
        <img class="user-dropdown-avatar" id="userDropdownAvatar" src="" alt="User">
        <div class="user-dropdown-info">
          <div class="user-dropdown-name" id="userDropdownName"></div>
          <div class="user-dropdown-email" id="userDropdownEmail"></div>
        </div>
      </div>
      <div class="user-dropdown-divider"></div>
      <button class="user-dropdown-item" id="signOutBtn">
        <svg viewBox="0 0 16 16" fill="currentColor">
          <path fill-rule="evenodd" d="M10 12.5a.5.5 0 0 1-.5.5h-8a.5.5 0 0 1-.5-.5v-9a.5.5 0 0 1 .5-.5h8a.5.5 0 0 1 .5.5v2a.5.5 0 0 0 1 0v-2A1.5 1.5 0 0 0 9.5 2h-8A1.5 1.5 0 0 0 0 3.5v9A1.5 1.5 0 0 0 1.5 14h8a1.5 1.5 0 0 0 1.5-1.5v-2a.5.5 0 0 0-1 0v2z"/>
          <path fill-rule="evenodd" d="M15.854 8.354a.5.5 0 0 0 0-.708l-3-3a.5.5 0 0 0-.708.708L14.293 7.5H5.5a.5.5 0 0 0 0 1h8.793l-2.147 2.146a.5.5 0 0 0 .708.708l3-3z"/>
        </svg>
        Sign out
      </button>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="search-container">
        <svg class="search-icon" viewBox="0 0 16 16" fill="currentColor">
          <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0z"/>
        </svg>
        <input type="text" id="searchInput" class="search-input" placeholder="Search tabs..." autofocus>
        <button class="clear-btn" id="clearSearch" title="Clear search">
          <svg viewBox="0 0 16 16" fill="currentColor">
            <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z"/>
            <path d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708z"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Scrollable Content Area -->
    <div class="scrollable-content" id="scrollableContent">
    <!-- Tab List -->
    <main class="tab-list" id="tabList">
      <div class="loading" id="loadingState">
        <div class="spinner"></div>
        <span>Loading tabs...</span>
      </div>
      <div class="empty-state" id="emptyState" style="display: none;">
        <svg class="empty-icon" viewBox="0 0 16 16" fill="currentColor">
          <path d="M2 3a1 1 0 0 1 1-1h10a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V3zm1 0v10h10V3H3z"/>
        </svg>
        <span>No tabs found</span>
      </div>
      <!-- Tab items will be rendered here -->
    </main>

    <!-- Other Devices Section -->
    <section class="other-devices-section" id="otherDevicesSection" style="display: none;">
      <div class="section-header" id="otherDevicesHeader">
        <svg class="section-chevron" viewBox="0 0 16 16" fill="currentColor">
          <path d="M4.646 1.646a.5.5 0 0 1 .708 0l6 6a.5.5 0 0 1 0 .708l-6 6a.5.5 0 0 1-.708-.708L10.293 8 4.646 2.354a.5.5 0 0 1 0-.708z"/>
        </svg>
        <svg class="icon" viewBox="0 0 16 16" fill="currentColor">
          <path d="M0 4a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V4zm2-1a1 1 0 0 0-1 1v6a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V4a1 1 0 0 0-1-1H2z"/>
          <path d="M6 13.5a.5.5 0 0 1 .5-.5h3a.5.5 0 0 1 0 1h-3a.5.5 0 0 1-.5-.5z"/>
        </svg>
        <span>Other Devices</span>
        <span class="section-count" id="otherDevicesCount">(0)</span>
      </div>
      <div class="other-devices-list" id="otherDevicesList">
        <!-- Other devices will be rendered here -->
      </div>
    </section>

    <!-- Recently Closed Section -->
    <section class="recently-closed-section" id="recentlyClosedSection" style="display: none;">
      <div class="section-header" id="recentlyClosedHeader">
        <svg class="section-chevron" viewBox="0 0 16 16" fill="currentColor">
          <path d="M4.646 1.646a.5.5 0 0 1 .708 0l6 6a.5.5 0 0 1 0 .708l-6 6a.5.5 0 0 1-.708-.708L10.293 8 4.646 2.354a.5.5 0 0 1 0-.708z"/>
        </svg>
        <svg class="icon" viewBox="0 0 16 16" fill="currentColor">
          <path d="M8 3a5 5 0 1 0 4.546 2.914.5.5 0 0 1 .908-.417A6 6 0 1 1 8 2v1z"/>
          <path d="M8 4.466V.534a.25.25 0 0 1 .41-.192l2.36 1.966c.12.1.12.284 0 .384L8.41 4.658A.25.25 0 0 1 8 4.466z"/>
          <path d="M8 7.5a.5.5 0 0 1 .5.5v2.5H11a.5.5 0 0 1 0 1H8a.5.5 0 0 1-.5-.5V8a.5.5 0 0 1 .5-.5z"/>
        </svg>
        <span>Recently Closed</span>
        <span class="section-count" id="recentlyClosedCount">(0)</span>
      </div>
      <div class="recently-closed-list" id="recentlyClosedList">
        <!-- Recently closed tabs will be rendered here -->
      </div>
    </section>
    </div><!-- End of scrollable-content -->

    <!-- Footer -->
    <footer class="footer">
      <button class="footer-btn" id="themeBtn" title="Toggle theme">
        <svg viewBox="0 0 16 16" fill="currentColor" id="themeIcon">
          <path d="M6 .278a.768.768 0 0 1 .08.858 7.208 7.208 0 0 0-.878 3.46c0 4.021 3.278 7.277 7.318 7.277.527 0 1.04-.055 1.533-.16a.787.787 0 0 1 .81.316.733.733 0 0 1-.031.893A8.349 8.349 0 0 1 8.344 16C3.734 16 0 12.286 0 7.71 0 4.266 2.114 1.312 5.124.06A.752.752 0 0 1 6 .278z"/>
        </svg>
      </button>
      <div class="footer-spacer"></div>
    </footer>
    </div><!-- End of app-content -->
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
